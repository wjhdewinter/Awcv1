<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4;}
header { background:#111; color:#fff; padding:15px; text-align:center;}
nav { display:grid; grid-template-columns: repeat(4,1fr);}
nav button { padding:12px; border:none; background:#222; color:#fff;}
nav button.active { background:#ff7a00;}
main { padding:15px;}
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px;}
input,select,textarea { width:100%; padding:10px; margin-top:5px;}
button { margin-top:10px; padding:10px; width:100%;}
</style>
</head>

<body>

<header>
<h2>AWC Warehouse App</h2>
</header>

<nav>
<button onclick="showTab('dashboard')" class="active">Dashboard</button>
<button onclick="showTab('pallets')">Pallets</button>
<button onclick="showTab('checklist')">Checklist</button>
<button onclick="showTab('incident')">Incident</button>
</nav>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="tab card">
<h3>Totaal pallets</h3>
<div id="totaal">0</div>

<h3>Vergelijking</h3>
<div id="compare"></div>

<canvas id="chart"></canvas>
</div>

<!-- PALLETS -->
<div id="pallets" class="tab card" style="display:none;">
<h3>Pallet telling</h3>

<select id="locatie">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<label>Europallets</label>
<input type="number" id="euro" value="0">

<label>Blokpallets</label>
<input type="number" id="blok" value="0">

<label>2 meter pallets</label>
<input type="number" id="meter2" value="0">

<label>DPB pallets</label>
<input type="number" id="dpb" value="0">

<input placeholder="Naam" id="naam">

<button onclick="save()">Opslaan</button>
<button onclick="mail()">Mail</button>
<button onclick="pdf()">PDF</button>

<h3>Geschiedenis</h3>
<ul id="lijst"></ul>
</div>

<!-- CHECKLIST -->
<div id="checklist" class="tab card" style="display:none;">
<h3>Machine check</h3>

<select id="machine">
<option>Reachtruck</option>
<option>Pompkar</option>
</select>

<textarea id="checkText" placeholder="Probleem"></textarea>
<input type="file" id="foto">

<button onclick="mailCheck()">Mail</button>
<button onclick="pdfCheck()">PDF</button>
</div>

<!-- INCIDENT -->
<div id="incident" class="tab card" style="display:none;">
<h3>Bijna ongeval</h3>

<textarea id="incidentText"></textarea>

<button onclick="mailIncident()">Mail</button>
<button onclick="pdfIncident()">PDF</button>
</div>

</main>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function showTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
document.getElementById(tab).style.display="block";
}

function save(){
let euro = +document.getElementById("euro").value;
let blok = +document.getElementById("blok").value;
let meter2 = +document.getElementById("meter2").value;
let dpb = +document.getElementById("dpb").value;

let total = euro+blok+meter2+dpb;

let item = {
loc:document.getElementById("locatie").value,
euro,blok,meter2,dpb,total,
date:new Date().toLocaleString()
};

data.push(item);
localStorage.setItem("data",JSON.stringify(data));

render();
}

function render(){
let totaal = data.reduce((a,b)=>a+b.total,0);
document.getElementById("totaal").innerText = totaal;

let lijst="";
data.slice().reverse().forEach(i=>{
lijst += `<li>${i.date} - ${i.loc} - ${i.total}</li>`;
});
document.getElementById("lijst").innerHTML = lijst;

if(data.length>1){
let d = data[data.length-1].total - data[data.length-2].total;
document.getElementById("compare").innerText = "Verschil: "+d;
}

drawChart();
}

function drawChart(){
let ctx = document.getElementById("chart");
new Chart(ctx,{
type:'line',
data:{
labels:data.map(i=>i.date),
datasets:[{data:data.map(i=>i.total)}]
}
});
}

function mail(){
let body = data.map(i=>`${i.loc} ${i.total}`).join("\n");
location.href="mailto:?body="+body;
}

function pdf(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();
let y=10;

data.forEach(i=>{
doc.text(`${i.loc} ${i.total}`,10,y);
y+=10;
});

doc.save("pallets.pdf");
}

function mailCheck(){
let txt=document.getElementById("checkText").value;
location.href="mailto:?body="+txt;
}

function pdfCheck(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text(document.getElementById("checkText").value,10,10);
doc.save("check.pdf");
}

function mailIncident(){
location.href="mailto:?body="+document.getElementById("incidentText").value;
}

function pdfIncident(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text(document.getElementById("incidentText").value,10,10);
doc.save("incident.pdf");
}

render();
</script>

</body>
</html>
