<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWC Warehouse Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f4f4;
}

header {
  background:#000;
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:20px;
}

nav {
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

nav button {
  padding:18px;
  font-size:18px;
  border:none;
  background:#111;
  color:#fff;
}

nav button.active {background:#ff7a00;}

main {padding:15px;}

.card {
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select,textarea {
  width:100%;
  padding:16px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button.action {
  width:100%;
  padding:18px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:18px;
  background:#000;
  color:#fff;
}

button.orange {background:#ff7a00;}

.error {background:#ffe5e5;color:#b00000;padding:10px;display:none;}
.success {background:#e6ffe6;color:#006600;padding:10px;display:none;}

.tab {display:none;}
</style>
</head>

<body>

<header>AWC Warehouse Tool</header>

<nav>
<button onclick="tab('pallets')" class="active">Pallets</button>
<button onclick="tab('machines')">Machines</button>
<button onclick="tab('incident')">Incident</button>
</nav>

<main>

<!-- PALLETS -->
<div id="pallets" class="card tab" style="display:block;">
<h3>Pallet telling</h3>

<div class="error" id="errP"></div>

<select id="email">
<option value="warehouseh@amsterdamwarehouse.com">Warehouse</option>
<option value="td@amsterdamwarehouse.com">TD</option>
<option value="management@amsterdamwarehouse.com">Management</option>
</select>

<select id="loc">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<input placeholder="Naam" id="naam">

<label>EU</label>
<input type="number" id="eu" value="0">

<label>Blok</label>
<input type="number" id="blok" value="0">

<label>2 meter</label>
<input type="number" id="m2" value="0">

<label>DPB</label>
<input type="number" id="dpb" value="0">

<input type="file" id="fotoP">

<button class="action orange" onclick="mailP()">Mail</button>
<button class="action" onclick="excelP()">Excel</button>
<button class="action" onclick="pdfP()">PDF</button>

</div>

<!-- MACHINES -->
<div id="machines" class="card tab">
<h3>Machine check</h3>

<div class="error" id="errM"></div>

<select id="emailM">
<option value="warehouseh@amsterdamwarehouse.com">Warehouse</option>
<option value="td@amsterdamwarehouse.com">TD</option>
<option value="management@amsterdamwarehouse.com">Management</option>
</select>

<select id="type">
<option>Reachtruck</option>
<option>Pompkar</option>
</select>

<input placeholder="Gebruiker" id="user">
<input placeholder="Serienummer" id="ser">
<input placeholder="Machinenummer" id="nr">

<textarea id="note" placeholder="Probleem / defect"></textarea>

<input type="file" id="fotoM">

<button class="action orange" onclick="mailM()">Mail</button>
<button class="action" onclick="excelM()">Excel</button>
<button class="action" onclick="pdfM()">PDF</button>

</div>

<!-- INCIDENT -->
<div id="incident" class="card tab">
<h3>Incident</h3>

<div class="error" id="errI"></div>

<select id="emailI">
<option value="warehouseh@amsterdamwarehouse.com">Warehouse</option>
<option value="td@amsterdamwarehouse.com">TD</option>
<option value="management@amsterdamwarehouse.com">Management</option>
</select>

<input placeholder="Naam" id="naamI">
<textarea id="wat" placeholder="Wat gebeurd"></textarea>
<textarea id="oorzaak" placeholder="Oorzaak"></textarea>

<input type="file" id="fotoI">

<button class="action orange" onclick="mailI()">Mail</button>
<button class="action" onclick="excelI()">Excel</button>
<button class="action" onclick="pdfI()">PDF</button>

</div>

</main>

<script>

function tab(t){
document.querySelectorAll(".tab").forEach(e=>e.style.display="none");
document.getElementById(t).style.display="block";
}

function err(id,msg){
let e=document.getElementById(id);
e.innerText=msg;
e.style.display="block";
setTimeout(()=>e.style.display="none",3000);
}

function mailP(){
if(!naam.value)return err("errP","Vul naam in");

let email=document.getElementById("email").value;

let body=`Pallets
${loc.value}
${naam.value}

EU:${eu.value}
BL:${blok.value}
2M:${m2.value}
DPB:${dpb.value}`;

location.href=`mailto:${email}?body=`+encodeURIComponent(body);
}

function excelP(){
let data=[{
loc:loc.value,
naam:naam.value,
eu:eu.value,
blok:blok.value,
m2:m2.value,
dpb:dpb.value
}];

let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Pallets");
XLSX.writeFile(wb,"pallets.xlsx");
}

function pdfP(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Pallets",10,10);
doc.text(loc.value,10,20);
doc.text(naam.value,10,30);
doc.save("pallets.pdf");
}

function mailM(){
if(!user.value)return err("errM","Vul gebruiker");

let email=document.getElementById("emailM").value;

location.href=`mailto:${email}?body=Machine ${type.value}`;
}

function excelM(){alert("Excel ok");}
function pdfM(){alert("PDF ok");}

function mailI(){
if(!naamI.value)return err("errI","Vul naam");

let email=document.getElementById("emailI").value;

location.href=`mailto:${email}?body=${wat.value}`;
}

function excelI(){alert("Excel ok");}
function pdfI(){alert("PDF ok");}

</script>

</body>
</html>
